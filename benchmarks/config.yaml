# Benchmark configuration for sharkmer regression testing.
#
# Each sample has a list of max_reads values to benchmark at.
# Samples with single-copy nuclear gene panels (cnidaria, insecta) get
# multi-level coverage sweeps to measure sensitivity. All others run at 1M.
# Sweeps are always run largest-first (reverse sorted).
#
# Data files in benchmarks/data/ are named {accession}.fastq and contain
# at least as many reads as the largest max_reads value. The --max-reads
# flag in sharkmer controls how many reads are actually used per run.

sample:
### Public datasets of paired-end reads from NCBI SRA

# Selected cndiarian datasets — coverage sweep for nuclear gene sensitivity

    # Porites_lutea removed: ERR571460 has almost no mitochondrial reads,
    # making it uninformative for mt gene benchmarking and confusing results.
    # See dev_docs/failure_analysis.md for details.

    Xenia_sp:
        taxonomy: "Eukaryota; Opisthokonta; Metazoa; Eumetazoa; Cnidaria; Anthozoa; Octocorallia; Malacalcyonacea; Xeniidae; Xenia; unclassified Xenia"
        reads:
            - SRR9278435 # From genome bioproject, SRR9278432 is a smaller dataset
        arguments: "--pcr-panel cnidaria"
        genome:
            accession: GCF_021976095.1
            size_mb: 222.7 # 10x is about 15M reads
            n50_mb: 14.8
        biosample: https://www.ncbi.nlm.nih.gov/biosample/SAMN23741995/
        publication: https://doi.org/10.1038/s41586-020-2385-7
        max_reads:
            - 16000000
            - 8000000
            - 4000000
            - 2000000
            - 1000000

    Agalma_elegans:
        taxonomy: "Eumetazoa; Cnidaria; Hydrozoa; Hydroidolina; Siphonophorae; Physonectae; Agalmatidae; Agalma"
        reads:
            - SRR25099394
        arguments: "--pcr-panel cnidaria"
        max_reads:
            - 16000000
            - 8000000
            - 4000000
            - 2000000
            - 1000000

# These samples are selected for cnidarian sequences as well as bacterial carryover sequences
    Rhopilema_esculentum:
        taxonomy: "Eumetazoa; Cnidaria; Scyphozoa; Rhizostomeae; Rhizostomatidae; Rhopilema"
        reads:
            - SRR8617500
        arguments: "--pcr-panel cnidaria --pcr-panel bacteria"
        max_reads:
            - 16000000
            - 8000000
            - 4000000
            - 2000000
            - 1000000
        genome:
            accession: "GCF_013076305.1"
            size_mb: 256.7
            n50_mb: 12.9

