# Benchmark configuration for sharkmer regression testing.
#
# max_reads: default list of read counts to benchmark at.
# Each sample is run once per value, with results keyed by read count.
# Samples can override this with a per-sample max_reads list.
# Sweeps run high-to-low so the largest download populates the cache first.
max_reads:
    - 1000000

# Coverage sensitivity sweep for samples with single-copy nuclear genes.
# Insect and cnidarian panels include EF1A, EF1g, Fz4, Gpdh, Pgi, Yp2.
coverage_sweep_reads: &coverage_sweep
    - 16000000
    - 8000000
    - 4000000
    - 2000000
    - 1000000

sample:
### Public datasets of paired-end reads from NCBI SRA

# Selected cndiarian datasets
    Porites_lutea:
        taxonomy: "Eumetazoa; Cnidaria; Anthozoa; Hexacorallia; Scleractinia; Fungiina; Poritidae; Porites"
        reads:
            # - SRR2976390 # low quality at end of reads, small dataset. Alternate options - ERS514281
            - ERR571460
        arguments: "--pcr-panel cnidaria"
        max_reads: *coverage_sweep
        genome:
            accession: "GCA_958299795.1"
            size_mb: 541.6
            n50_mb: 36

    Agalma_elegans:
        taxonomy: "Eumetazoa; Cnidaria; Hydrozoa; Hydroidolina; Siphonophorae; Physonectae; Agalmatidae; Agalma"
        reads:
            - SRR25099394
        arguments: "--pcr-panel cnidaria"
        max_reads: *coverage_sweep
        # no public genome available March 2025

# These samples are selected for cnidarian sequences as well as bacterial carryover sequences
    Rhopilema_esculentum:
        taxonomy: "Eumetazoa; Cnidaria; Scyphozoa; Rhizostomeae; Rhizostomatidae; Rhopilema"
        reads:
            - SRR8617500
        arguments: "--pcr-panel cnidaria --pcr-panel bacteria"
        max_reads: *coverage_sweep
        genome:
            accession: "GCF_013076305.1"
            size_mb: 256.7
            n50_mb: 12.9

# Additional preconfigured datasets
