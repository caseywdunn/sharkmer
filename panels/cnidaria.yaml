  gene_type: "rRNA_SSU"
  copy_number: "high_copy"
  forward_seq: "AACCTGGTTGATCCTGCCAGT"
  reverse_seq: "TGATCCTTCTGCAGGTTCACCTAC"
  min_length: 1600
  max_length: 2000
  expected_length: 1790
  min_count: 2
  mismatches: 2
  trim: 15
  citation: "Medlin et al. 1988 https://doi.org/10.1016/0378-1119(88)90066-2"
  notes: ""

