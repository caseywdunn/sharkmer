name: cnidaria
description: "Universal and custom primers targeting mitochondrial and nuclear products."
primers:
  - gene_name: "16S"
    forward_seq: "GRCTGTTTACCAAAAACATA"
    reverse_seq: "AATTCAACATMGAGG"
    min_length: 500
    max_length: 700
    min_count: 2
    mismatches: 2
    trim: 15
    citation: "Modified from Cunningham and Buss 1993 https://doi.org/10.1016/0305-1978(93)90009-G "
    notes: "Amplifies portions of domains IV and V. Product is about 580bp"

  - gene_name: "CO1"
    forward_seq: "TCATAARGATATHGG"
    reverse_seq: "RTGNCCAAAAAACCA"
    min_length: 600
    max_length: 800
    min_count: 2
    mismatches: 2
    trim: 15
    citation: "Modified from Folmer et al. 1994"
    notes: "Product is about 700bp long"

  - gene_name: "18S"
    forward_seq: "AACCTGGTTGATCCTGCCAGT"
    reverse_seq: "TGATCCTTCTGCAGGTTCACCTAC"
    min_length: 1600
    max_length: 2000
    min_count: 2
    mismatches: 2
    trim: 15
    citation: "Medlin et al. 1988 https://doi.org/10.1016/0378-1119(88)90066-2"
    notes: "Product is about 1790bp"

  - gene_name: "28S"
    forward_seq: "CCYYAGTAACGGCGAGT"
    reverse_seq: "SWACAGATGGTAGCTTCG"
    min_length: 2900
    max_length: 3500
    min_count: 2
    mismatches: 2
    trim: 15
    citation: "Evans et al. 2008. https://doi.org/10.1186/1471-2148-8-139"
    notes: "Forward primer is F97, reverse is R3238. Product is about 3230bp."

  - gene_name: "ITS"
    forward_seq: "TACACACCGCCCGTCGCTACTA"
    reverse_seq: "ACTCGCCGTTACTRRGG"
    min_length: 600
    max_length: 1000
    min_count: 2
    mismatches: 2
    trim: 15
    citation: "Ji et al 2003. https://doi.org/10.1046/j.1471-8286.2003.00519.x"
    notes: "Forward primer is CAS18SF1, position 1843, from Ji et al 2003. The reverse primer is the reverse complement of the 28S forward primer. Product is about 770-880bp."

  - gene_name: "ITS-v2"
    forward_seq: "GTAGGTGAACCTGCAGAAGGATCA"
    reverse_seq: "ACTCGCCGTTACTRRGG"
    min_length: 600
    max_length: 1000
    min_count: 2
    mismatches: 2
    trim: 15
