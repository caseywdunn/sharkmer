name: cnidaria
schema_version: "2"
panel_version: 1.1.0
description: "Universal and custom primers targeting mitochondrial and nuclear products."
clade: "Cnidaria"
taxon_id: 6073

maintainers:
- name: "Samuel Church"
  orcid: "https://orcid.org/0000-0002-8451-103X"

changelog:
- panel_version: 1.1.0
  date: 2026-04-05
  sharkmer_version: "3.0.0"
  changes: "CO1 primer redesigned from 161 cnidarian mitogenomes. New primers reduce degeneracy (48 → 32 kmer variants per pair) and extend reverse primer to 19 bp for specificity. Validated against Xenia, Agalma, Rhopilema benchmarks: 13/15 runs recover real CO1 at 99.6-100% identity (vs 5/15 with v1.0.0 primer). See tmp/CO1/primer_design_report.md."
- panel_version: 1.0.0
  date: 2026-04-05
  sharkmer_version: "3.0.0"
  changes: "Initial versioned schema."

primers:
- gene: "16S"
  compartment: "mitochondrion"
  gene_type: "rRNA_LSU"
  copy_number: "high_copy"
  forward_seq: "GRCTGTTTACCAAAAACATA"
  reverse_seq: "AATTCAACATMGAGG"
  min_length: 500
  max_length: 700
  expected_length: 580
  min_count: 2
  mismatches: 2
  trim: 15
  citation: "Modified from Cunningham and Buss 1993 https://doi.org/10.1016/0305-1978(93)90009-G "
  notes: "Amplifies portions of domains IV and V. These binding sites are variable in Cnidaria and it is challenging to make primers that work well across all Cnidaria."

- gene: "CO1"
  compartment: "mitochondrion"
  gene_type: "protein_coding"
  copy_number: "high_copy"
  forward_seq: "WAAYCATAAAGATAT"
  reverse_seq: "GGRTGMCCAAAAAACCARA"
  min_length: 600
  max_length: 800
  expected_length: 693
  min_count: 2
  mismatches: 2
  trim: 18
  citation: "Redesigned from Folmer et al. 1994 using 161 cnidarian mitogenomes (2026-04)"
  notes: "Forward is 15 bp, reverse is 19 bp; trim=18 keeps the 3'-most 18 bases of the reverse primer (the maximum at default k=19; trim must be ≤ k-1 so all trimmed bases are captured in the seed node). Generates 4 × 8 = 32 kmer variants per pair (vs 48 for previous panel). Expected amplicon ~693 bp. Validated against Xenia, Agalma, Rhopilema: 13/15 runs across 1M-16M read sweeps recover real CO1 at 99.6-100% BLAST identity. Predicted coverage across 161 cnidarian mt genomes: 92% Scyphozoa, 72% Octocorallia, 52% Hexacorallia, 35% Hydrozoa. Siphonophores and sea anemones often need specialized primers."

