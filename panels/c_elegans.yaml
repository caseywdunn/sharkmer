name: c_elegans
version: 1.0.0
description: "Development panel for Caenorhabditis elegans (N2 strain). Exact primers (no degeneracy) for mitochondrial, ribosomal, and single-copy nuclear genes. Designed for benchmarking sPCR recovery of nuclear SCGs."

maintainers:
- name: "Casey Dunn"

changelog:
- version: 1.0.0
  date: 2026-04-05
  sharkmer_version: "3.0.0-dev"
  changes: "Initial panel. Exact 0mm primers extracted from N2 reference sequences at binding sites of established universal/phylogenetic primers."

primers:
  # --- Mitochondrial genes (NC_001328) ---

- gene_name: "16S"
  forward_seq: "AAGATAAGTCTTCGGAAATT"
  reverse_seq: "GAATTAAACTAATATCAC"
  min_length: 200
  max_length: 350
  expected_length: 264
  min_count: 2
  mismatches: 1
  trim: 15
  citation: "Exact C. elegans sequence at binding sites of 16S.C345 primers from Chan et al. 2020, https://doi.org/10.1186/s13071-020-04242-8"
  notes: "Large ribosomal subunit rRNA (l-rRNA, rrn-l). mt positions 10988-11251. Nematode-specific primers; the cnidarian panel Cunningham & Buss 1993 primers have no homologous binding site in nematode mt (>6 mismatches)."

- gene_name: "CO1"
  forward_seq: "TAATCATAAAGATAT"
  reverse_seq: "GGATGACCAAAAAATCAAA"
  min_length: 550
  max_length: 800
  expected_length: 690
  min_count: 2
  mismatches: 1
  trim: 15
  citation: "Exact C. elegans sequence at binding sites of Folmer et al. 1994 LCO/HCO primers, https://doi.org/10.1111/j.1365-2583.1994.tb00180.x"
  notes: "Cytochrome c oxidase subunit 1 (ctc-1). mt positions 7898-8587. Cnidarian panel Folmer primers bind here with 0mm fwd, 1mm rev."

  # --- Nuclear ribosomal genes (rDNA repeat, X03680) ---

- gene_name: "18S"
  forward_seq: "TACCTGATTGATTCTGTCAGC"
  reverse_seq: "TGATCCAGCTGCAGGTTCACCTAC"
  min_length: 1500
  max_length: 1900
  expected_length: 1756
  min_count: 2
  mismatches: 1
  trim: 15
  citation: "Exact C. elegans sequence at binding sites of Medlin et al. 1988, https://doi.org/10.1016/0378-1119(88)90066-2"
  notes: "Near full-length 18S SSU rRNA. rDNA positions 935-2690. Cnidarian panel primers bind here with 5mm fwd, 2mm rev."

- gene_name: "28S"
  forward_seq: "CCTTAGTAACGGCGAGT"
  reverse_seq: "TCTCAAATGGTAGCTTCA"
  min_length: 2700
  max_length: 3500
  expected_length: 3135
  min_count: 2
  mismatches: 1
  trim: 15
  citation: "Exact C. elegans sequence at binding sites of Evans et al. 2008 F97/R3238 primers, https://doi.org/10.1186/1471-2148-8-139"
  notes: "Large subunit rRNA (26S in C. elegans, homologous to 28S). rDNA positions 3774-6908. Cnidarian panel F97 binds with 0mm; R3238 with 5mm."

- gene_name: "ITS"
  forward_seq: "TACACACCGCCCGTCGCTATCC"
  reverse_seq: "ACTCGCCGTTACTAAGG"
  min_length: 1000
  max_length: 1500
  expected_length: 1266
  min_count: 2
  mismatches: 1
  trim: 15
  citation: "Exact C. elegans sequence at binding sites of Ji et al. 2003 CAS18SF1 (fwd) and Evans et al. 2008 F97-RC (rev), https://doi.org/10.1046/j.1471-8286.2003.00519.x"
  notes: "ITS1 + 5.8S + ITS2. rDNA positions 2525-3790. Forward anchored in 3-prime end of 18S, reverse in 5-prime end of 26S. Larger than cnidarian ITS (1266 vs 825bp) due to longer ITS spacers in nematodes."

- gene_name: "ITS-v2"
  forward_seq: "GTAGGTGAACCTGCAGCTGGATCA"
  reverse_seq: "ACTCGCCGTTACTAAGG"
  min_length: 900
  max_length: 1300
  expected_length: 1124
  min_count: 2
  mismatches: 1
  trim: 15
  citation: "Exact C. elegans sequence; forward is RC of 18S reverse primer, reverse is RC of 28S forward primer. Same design as cnidarian panel ITS-v2."
  notes: "ITS1 + 5.8S + ITS2. rDNA positions 2667-3790. Forward starts at 18S 3-prime end (RC of 18S reverse primer), reverse same as ITS entry."

  # --- Single-copy nuclear genes ---

- gene_name: "EF1A"
  forward_seq: "GGACGTGTTGAGACCGGAAT"
  reverse_seq: "TGACGGAGACGTTCTTGACG"
  min_length: 100
  max_length: 250
  expected_length: 160
  min_count: 2
  mismatches: 1
  trim: 15
  citation: "Chalorak et al. 2020, https://doi.org/10.3389/fnins.2020.00303"
  notes: "Elongation factor 1-alpha (eef-1A.1 / eft-3, F31E3.5). Chromosome III. qPCR primers, both in exon 3 so genomic amplicon equals cDNA amplicon (160bp). Short product but useful for testing sPCR at low amplicon sizes."

- gene_name: "H3"
  forward_seq: "ATGGCTCGTACCAAGCAAACCGC"
  reverse_seq: "ATGTCCTTTGGCATGATGGTGAC"
  min_length: 350
  max_length: 550
  expected_length: 433
  min_count: 2
  mismatches: 1
  trim: 15
  citation: "Exact C. elegans sequence at binding sites of Colgan et al. 1998 H3AF/H3AR primers (Aust. J. Zool. 46:419-437)"
  notes: "Replication-independent histone H3.3 (his-72, Y49E10.6). Chromosome III. Colgan H3AF binds with 1mm, H3AR with 2mm; exact C. elegans sequences extracted. Genomic amplicon includes one 59bp intron (mRNA amplicon 374bp)."

