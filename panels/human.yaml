notes: >
  Primers from Ramos et al. 2009 were designed to amplify the complete human
  mitochondrial genome in nine overlapping fragments while specifically
  excluding nuclear copies of mtDNA (NUMTs). The anti-NUMT design requires
  high primer specificity; adding degeneracy undermines this property and
  causes off-target amplification from NUMTs in the large human nuclear genome.
  Performance is haplogroup-dependent and is best for individuals whose
  mitochondrial haplotype is close to the revised Cambridge Reference Sequence
  (rCRS, haplogroup H). Individuals carrying deeply divergent haplogroups
  (e.g. African L-class) may exhaust the mismatches=2 tolerance at multiple
  primer binding sites simultaneously. When both primers in a pair are at the
  mismatch limit, the de Bruijn graph assembly can produce oversized artifacts
  (~150 bp excess) with no BLAST match rather than a genuine amplicon; such
  products should be treated as assembly artifacts, not valid sequences.
  Validation sample ERR4049009 is an example of this: it carries a highly
  divergent haplogroup and shows this artifact pattern for mt-3734-6739,
  mt-11977-13830, and mt-14898-151.

