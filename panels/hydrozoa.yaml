name: hydrozoa
schema_version: "2"
panel_version: 1.0.7
description: "Primers targeting mitochondrial and nuclear markers for Hydrozoa (Cnidaria: Hydrozoa), covering hydroids, siphonophores, leptothecates, and trachylines."

clade: "Hydrozoa"
taxon_id: 6074

maintainers:
  - name: "Casey Dunn"

changelog:
  - panel_version: 1.0.7
    date: 2026-04-13
    sharkmer_version: "3.0.0"
    changes: "Added Turritopsis 16S expected block — stable at 554bp/99.8% across all depths since v1.0.6. 16S forward-primer T→W widening at trim pos 2 was tested to reduce Clytia mismatches from 2 to 1, but caused node-budget exhaustion in Physalia 16S and Clytia 16S (seed-space doubling W×M=4 vs old M=2 made marginal-recovery graphs fail). Forward primer reverted to GRCTGTTTAMCAAAAACATA. Clytia 16S remains unrecoverable — attributed to Leptothecata mitochondrial genome fragmentation. last_validated updated."
  - panel_version: 1.0.6
    date: 2026-04-13
    sharkmer_version: "3.0.0"
    changes: "16S reverse primer positions 5 and 8 widened C to S (AATTCAWCMTMGAGG → AATTSAWSMTMGAGG). Clytia has G at both positions, consuming both mismatch slots on the reverse primer; S frees that budget so the forward primer mismatches (pos 2, 12) can be absorbed. Specificity drops by 2 bits to ~57 bits effective. last_validated reset pending re-validation."
  - panel_version: 1.0.5
    date: 2026-04-13
    sharkmer_version: "3.0.0"
    changes: "Replaced Aglantha 16S reference EU293985.1 (wrong amplicon region) with KP776745.1 trimmed to reverse primer 3' end (539 bp). Fixed Craspedacusta taxon spelling in CO1 and 18S references (sowerbii → sowerbyi). Updated all expected identity thresholds from second validation run with per-taxon references; thresholds set ~1% below observed values."
  - panel_version: 1.0.4
    date: 2026-04-13
    sharkmer_version: "3.0.0"
    changes: "Added per-taxon reference sequences for all four genes: 16S (6 new taxa), CO1 (6 new taxa including Craspedacusta RC), 18S (5 new taxa), 28S (7 new taxa). 28S Clytia (KX665495.1) and Aglantha (AY920791.1) trimmed to amplicon between F97 and R3238 primer sites. Hydractinia 28S (JQ410732.1) trimmed from F97 site. MN601815.1 reverse-complemented (deposited on complement strand). Expected blocks to be updated after re-validation."
  - panel_version: 1.0.3
    date: 2026-04-13
    sharkmer_version: "3.0.0"
    changes: "Schema v2 corrections: added schema_version, clade, taxon_id; renamed version to panel_version (panel level and changelog entries); renamed gene_name to gene (primers and references); added compartment/gene_type/copy_number metadata to primers; prefixed expected keys with panel name (e.g. 16S to hydrozoa_16S)."
  - panel_version: 1.0.2
    date: 2026-04-12
    sharkmer_version: "3.0.0"
    changes: "Populated expected validation blocks from v1.0.1 validation run. Thresholds set ~1% below observed values. 16S expected omitted for Agalma (recovers at 4000k only), Physalia (2000k+), Turritopsis (unstable: 700bp at 2000k, 554bp at 4000k), and Clytia (unreliable across depths). CO1 expected omitted for all samples except Agalma (length only; no BLAST hit to available reference) and Physalia (reliable recovery with BLAST). Added last_validated block. Note on Clytia 16S limitation added to 16S primer notes."
  - panel_version: 1.0.1
    date: 2026-04-12
    sharkmer_version: "3.0.0"
    changes: "Fixed 18S reverse primer universal mismatch at trim-window position 1 (T to C; all 9 validation samples show C). Widened 16S primers at partially-mismatched positions: forward pos 10 C to M, reverse pos 7 A to W and pos 9 A to M (Clytia was consuming both mismatch slots simultaneously). Updated CO1 notes with primer failure analysis. Removed Podocoryna americana (SRR37430455) — dataset failed all read depths. Added reference sequences for 16S (Hydra NC_011220.1, Craspedacusta EU293971.1), CO1 (Physalia GQ120033.1), 18S (Hydra AF358082.1), 28S (Hydra XR_007021210.2)."
  - panel_version: 1.0.0
    date: 2026-04-12
    sharkmer_version: "3.0.0"
    changes: "Initial panel."

primers:
  - gene: "16S"
    compartment: "mitochondrion"
    gene_type: "rRNA_LSU"
    copy_number: "high_copy"
    # original forward_seq: "GRCTGTTTACCAAAAACATA"
    forward_seq: "GRCTGTTTAMCAAAAACATA"
    # original reverse_seq: "AATTCAACATMGAGG"
    # v1.0.1 reverse_seq: "AATTCAWCMTMGAGG"
    reverse_seq: "AATTSAWSMTMGAGG"
    min_length: 500
    max_length: 700
    expected_length: 580
    min_count: 2
    mismatches: 2
    trim: 15
    citation: "Cunningham and Buss 1993 https://doi.org/10.1016/0305-1978(93)90009-G"
    notes: "Amplifies portions of domains IV and V of the mitochondrial 16S rRNA gene. Originally designed for Hydractiniidae (Hydrozoa: Anthoathecata), making it well-suited for hydrozoans generally. 16S is generally recommended over CO1 for Hydrozoa barcoding. Coverage across orders is variable. Forward primer: position 10 widened C to M (v1.0.1; Clytia has A at pos 10). Reverse primer: positions 7 and 9 widened A to W and A to M (v1.0.1); positions 5 and 8 widened C to S (v1.0.6) so Clytia's G at both positions is absorbed without consuming the mismatch budget. Primer specificity: ~55 bits effective (forward 38 bits + reverse 25 bits − 8 bits for mismatches=2). Clytia hemisphaerica (Leptothecata) 16S is not recovered: with mismatches=2, the forward primer has 2 mismatches in Clytia's binding site (trim pos 2 and 12), but graph construction fails with node-budget exhaustion attributed to Clytia's fragmented leptothecate mitochondrial genome. Widening forward trim pos 2 (T→W) to reduce Clytia to 1 mismatch was tested but caused node-budget exhaustion in Physalia 16S and was reverted (v1.0.7)."

  - gene: "CO1"
    compartment: "mitochondrion"
    gene_type: "protein_coding"
    copy_number: "high_copy"
    forward_seq: "GGTCAACAAATCATAAAGATATTGG"
    reverse_seq: "TAAACTTCAGGGTGACCAAAAAATCA"
    min_length: 580
    max_length: 750
    expected_length: 648
    min_count: 2
    mismatches: 2
    trim: 18
    citation: "Folmer et al. 1994 Mol Mar Biol Biotechnol 3:294-299 PMID:7881515"
    notes: "Standard Folmer COI barcoding primers LCO1490 and HCO2198. Coverage is limited across Hydrozoa due to primer binding-site divergence: LCO1490 forward primer has 3 mismatches in its 18-bp trim window against Anthoathecata (Hydra, Hydractinia, Turritopsis) and Limnomedusae (Craspedacusta); HCO2198 reverse primer has 4 trim mismatches against Leptothecata (Clytia) and 3 against Turritopsis. Shifting the primer site +/-10 bp does not improve coverage. Alternative primers PolyLCO and jgHCO2198 (Geller et al. 2013 doi:10.1111/1755-0998.12073) fix these failures but use inosine (I) which is not natively supported by sharkmer's degeneracy expansion. 16S is recommended over CO1 for broad hydrozoan barcoding. trim=18 uses the 3'-most 18 bp of each primer for graph seeding (the maximum useful trim at default k=19)."

  - gene: "18S"
    gene_type: "rRNA_SSU"
    copy_number: "high_copy"
    forward_seq: "AACCTGGTTGATCCTGCCAGT"
    # original reverse_seq: "TGATCCTTCTGCAGGTTCACCTAC"
    reverse_seq: "TGATCCTTCCGCAGGTTCACCTAC"
    min_length: 1600
    max_length: 2000
    expected_length: 1790
    min_count: 2
    mismatches: 2
    trim: 15
    citation: "Medlin et al. 1988 https://doi.org/10.1016/0378-1119(88)90066-2"
    notes: "Reverse primer trim-window position 1 corrected from T to C (universal mismatch vs all 9 hydrozoan validation samples — original Medlin 1988 primer has T at this position, but hydrozoans universally have C)."

  - gene: "28S"
    gene_type: "rRNA_LSU"
    copy_number: "high_copy"
    forward_seq: "CCYYAGTAACGGCGAGT"
    reverse_seq: "SWACAGATGGTAGCTTCG"
    min_length: 2900
    max_length: 3500
    expected_length: 3230
    min_count: 2
    mismatches: 2
    trim: 15
    citation: "Evans et al. 2008 https://doi.org/10.1186/1471-2148-8-139"
    notes: "Forward primer is F97, reverse is R3238."

